{% extends "base.html" %}
{% block title %}Sign out — NepaXplore{% endblock %}

{% block content %}
<div class="min-h-[70vh] flex items-center justify-center px-4">
  <div class="w-full max-w-sm text-center">
    <div class="text-5xl mb-6">👋</div>
    <h1 class="text-2xl font-bold text-white mb-2">Sign out?</h1>
    <p class="text-slate-400 text-sm mb-8">You'll need to log back in to access your subscription content.</p>

    <form method="POST" action="{% url 'account_logout' %}">
      {% csrf_token %}
      <button type="submit"
              class="w-full py-2.5 rounded-xl bg-red-500/20 border border-red-500/30 text-red-400 font-semibold text-sm hover:bg-red-500/30 transition mb-3">
        Yes, sign out
      </button>
    </form>
    <a href="/"
       class="block w-full py-2.5 rounded-xl border border-white/10 text-slate-300 text-sm hover:bg-white/5 transition">
      Cancel — stay logged in
    </a>
  </div>
</div>
{% endblock %}
