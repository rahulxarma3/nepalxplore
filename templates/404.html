{% extends "base.html" %}
{% block title %}Page Not Found — NepaXplore{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center px-4">
  <div class="text-center max-w-md">
    <div class="text-8xl font-black text-white/5 mb-4 leading-none select-none">404</div>
    <div class="text-4xl mb-4">🏔️</div>
    <h1 class="text-2xl font-bold text-white mb-3">Lost in the mountains?</h1>
    <p class="text-slate-400 mb-8">This page doesn't exist. It might have moved, or the URL might be wrong.</p>
    <div class="flex flex-col sm:flex-row gap-3 justify-center">
      <a href="/" class="px-5 py-2.5 rounded-xl bg-brand-500 text-white text-sm font-semibold hover:bg-brand-600 transition">
        Back to home
      </a>
      <a href="{% url 'content:feed' %}" class="px-5 py-2.5 rounded-xl border border-white/10 text-slate-300 text-sm hover:bg-white/5 transition">
        Browse feed
      </a>
    </div>
  </div>
</div>
{% endblock %}
