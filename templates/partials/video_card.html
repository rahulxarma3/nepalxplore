<a href="{% url 'content:video_detail' video.slug %}"
   class="video-card group relative flex flex-col rounded-2xl overflow-hidden bg-surface-card border border-white/5 hover:border-brand-500/30 transition">

  <!-- Thumbnail -->
  <div class="relative aspect-video overflow-hidden">
    <img src="{{ video.thumbnail_url }}" alt="{{ video.title }}"
         class="w-full h-full object-cover group-hover:scale-105 transition duration-500" />

    <!-- Play overlay -->
    <div class="play-overlay absolute inset-0 flex items-center justify-center bg-black/40">
      <div class="w-14 h-14 rounded-full bg-brand-500/90 flex items-center justify-center">
        <svg class="w-6 h-6 text-white ml-1" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </div>
    </div>

    <!-- Duration badge -->
    <div class="absolute bottom-2 right-2 px-2 py-0.5 rounded-md bg-black/70 text-white text-xs font-mono">
      {{ video.duration_display }}
    </div>

    <!-- Feed preview badge -->
    {% if video.is_feed_preview %}
    <div class="absolute top-2 left-2 px-2 py-0.5 rounded-full bg-green-500/80 text-white text-xs font-medium">
      Free
    </div>
    {% endif %}
  </div>

  <!-- Info -->
  <div class="p-4 flex flex-col gap-1 flex-1">
    {% if video.category %}
    <span class="text-xs text-brand-400 font-medium">{{ video.category.name }}</span>
    {% endif %}
    <h3 class="text-sm font-semibold text-white leading-snug line-clamp-2 group-hover:text-brand-300 transition">
      {{ video.title }}
    </h3>
    {% if video.location %}
    <p class="text-xs text-slate-500 mt-auto pt-2">📍 {{ video.location }}</p>
    {% endif %}
  </div>
</a>
